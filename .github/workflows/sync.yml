name: Sync Xingyu Web

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: server
    steps:
      - name: Sync xingyu-web to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            mkdir -p /opt/projects
            if [ ! -d /opt/projects/xingyu-web/.git ]; then
              git clone --branch master git@github.com:pxMan79/xingyu-web.git /opt/projects/xingyu-web
            fi

            cd /opt/projects/xingyu-web
            git fetch --all && git reset --hard origin/master

            mkdir -p server/data

            docker compose up -d --build --remove-orphans
