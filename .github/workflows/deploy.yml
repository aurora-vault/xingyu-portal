name: Sync Xingyu Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (验证前端可构建)
        run: npm run build

      - name: Prepare server dirs
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            mkdir -p /opt/projects/xingyu-web/server/data

      - name: Upload source
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "Dockerfile,.dockerignore,docker-compose.yml,index.html,package.json,package-lock.json,tsconfig.json,tsconfig.app.json,tsconfig.node.json,vite.config.ts,public/**,src/**,server/app.js,server/package.json,server/package-lock.json"
          target: "/opt/projects/xingyu-web"
          strip_components: 0

      - name: Build image and start
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            cd /opt/projects/xingyu-web
            docker compose up -d --build --remove-orphans
            docker ps --filter name=xingyu-web
