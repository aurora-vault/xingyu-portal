name: xingyu-portal

services:
  portal:
    image: xingyu/portal:latest
    build: .
    container_name: xingyu-portal
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    volumes:
      - ./server/data:/app/server/data
    networks:
      default: {}
      npm-net:
        aliases:
          - xingyu-portal

networks:
  npm-net:
    external: true
    name: nginx-proxy-manager_npm-net
